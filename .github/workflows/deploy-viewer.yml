# Publishes the version-pinned snapshot viewer bundle to GitHub Pages.
#
# The site layout (see snapshot-viewer.json + SNAPSHOT_CONTRACT.md §1/§9) is:
#     /viewer/<version>/app.js      one immutable bundle per schema version
#     /.nojekyll                    disables Jekyll so paths starting with _ are served
#
# Every published viewer/<version>/ directory is IMMUTABLE and must survive
# forever: old snapshot HTML files hard-pin a specific version URL, so deleting
# or mutating a version dir breaks every snapshot that already shipped against
# it. This workflow therefore publishes ACCUMULATIVELY (keep_files: true) and
# refuses to overwrite an already-published version with different bytes.
name: deploy-viewer

on:
  push:
    branches: [main]
    paths:
      # Anything that can change the built bundle or its version pointer.
      - "frontend/**"
      - "snapshot-viewer.json"
      - ".github/workflows/deploy-viewer.yml"
  workflow_dispatch:

permissions:
  contents: write # peaceiris/actions-gh-pages pushes to the gh-pages branch

concurrency:
  # Serialize deploys so two runs can't race on the immutability check / push.
  group: deploy-viewer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4

      - name: Read viewer version
        id: version
        # Single source of truth; never hardcode the version string.
        run: echo "version=$(jq -er .version snapshot-viewer.json)" >>"$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build viewer bundle
        # build:app reads ../snapshot-viewer.json and emits
        #   frontend/dist-app/viewer/<version>/app.js  (+ frontend/dist-app/.nojekyll)
        run: |
          cd frontend
          npm ci
          npm run build:app

      - name: Checkout currently published site (gh-pages)
        # First-ever deploy has no gh-pages branch yet; tolerate that and let the
        # immutability guard treat it as "no prior versions published".
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Enforce version immutability
        # A brand-new viewer/<version>/ is allowed. Re-publishing an existing
        # version is allowed ONLY if the bytes are identical (idempotent re-run);
        # any content change to an already-published version is rejected so the
        # operator is forced to bump `version` in snapshot-viewer.json instead of
        # mutating history that live snapshots depend on.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          published="gh-pages/viewer/${VERSION}"
          built="frontend/dist-app/viewer/${VERSION}"
          if [ ! -d "$built" ]; then
            echo "::error::expected build output '$built' not found (build:app path mismatch?)"
            exit 1
          fi
          if [ ! -d "$published" ]; then
            echo "New version ${VERSION} — nothing published under that path yet; will publish."
            exit 0
          fi
          if diff -qr "$published" "$built" >/dev/null; then
            echo "Version ${VERSION} already published and byte-identical — idempotent re-deploy."
            exit 0
          fi
          echo "::error::viewer/${VERSION}/ is already published with DIFFERENT content. Published viewer versions are immutable. Bump 'version' in snapshot-viewer.json (and add the matching schema golden) instead of mutating an existing version."
          diff -qr "$published" "$built" || true
          exit 1

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: frontend/dist-app
          # keep_files: preserve every previously published viewer/<version>/ dir
          # (and the root .nojekyll). This is what makes publishing accumulative
          # and keeps old, still-referenced versions alive forever.
          keep_files: true
          full_commit_message: "Publish viewer ${{ steps.version.outputs.version }} (${{ github.sha }})"

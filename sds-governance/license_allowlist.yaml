# Durable record of the dependency-license posture (v3 Part 12 / R15).
# scan_licenses.py fails on forbidden packages or un-adjudicated copyleft.

allowed_licenses:
  - mit
  - bsd
  - apache
  - apache-2.0
  - apache software license
  - psf
  - python software foundation
  - isc
  - mpl-2.0          # weak copyleft, file-level; acceptable for libraries
  - historical permission notice and disclaimer
  - hpnd
  - unlicense
  - zlib
  - lgpl             # dynamic-link copyleft; acceptable

# Packages explicitly adjudicated despite a copyleft / unusual license. The
# GPL clustering chain (leidenalg / igraph, backing sc.tl.leiden/louvain) was
# removed and replaced by graspologic-native (MIT); no strong-copyleft package
# remains to adjudicate. certifi and tqdm are MPL-2.0 (weak, file-level
# copyleft), covered by `allowed_licenses` above — the app modifies neither.
adjudicated_packages: {}

# The GPL clustering-license question is resolved: the copyleft backends were
# removed, so distribution is no longer blocked on it.
clustering_decision_todo: false

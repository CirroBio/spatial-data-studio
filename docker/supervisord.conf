# Dropped into /etc/supervisor/conf.d/ — loaded via [include] from the main supervisord.conf.
# Only [program:] sections belong here; global [supervisord] settings live in the main conf.

# ---------------------------------------------------------------------------
# nginx — edge server; serves SPA and proxies /api/* to uvicorn
# Stays up while uvicorn restarts so the SPA shell remains reachable.
# ---------------------------------------------------------------------------
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=2
startretries=3
priority=10
stdout_logfile=/var/log/supervisor/nginx.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/var/log/supervisor/nginx-err.log
stderr_logfile_maxbytes=5MB


# ---------------------------------------------------------------------------
# uvicorn — FastAPI backend; single worker mandatory (DESIGN §19.2)
# Restarted by supervisor with retries; nginx stays up during restarts.
# stopwaitsecs is generous so in-flight saves can flush (DESIGN §19.7).
# ---------------------------------------------------------------------------
[program:uvicorn]
command=python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 --workers 1 --log-level info --no-access-log
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=5
stopsignal=SIGTERM
stopwaitsecs=120
priority=20
environment=PYTHONPATH="/app"
stdout_logfile=/var/log/supervisor/uvicorn.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/uvicorn-err.log
stderr_logfile_maxbytes=20MB
stderr_logfile_backups=3

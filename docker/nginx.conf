worker_processes auto;
# Log to the container's stderr (not a file inside the container) so nginx
# errors — e.g. 502s while uvicorn is crash-looping — reach `docker logs` and
# the hosting platform's aggregator, where they can actually be read.
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip static assets; skip binary/Arrow responses
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 8888;
        server_name _;

        # Root: serve the compiled SPA
        root /app/spa;
        index index.html;

        # ----- API proxy -----
        # All /api/* routes go to uvicorn
        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Arrow IPC responses can be large; allow generous body/timeout
            proxy_request_buffering    off;
            proxy_buffering            off;
            client_max_body_size       256m;
            proxy_read_timeout         300s;
            proxy_send_timeout         300s;
            proxy_connect_timeout      10s;
        }

        # ----- SSE endpoint — MUST have proxy_buffering off (DESIGN §19.1) -----
        location /api/events {
            proxy_pass             http://127.0.0.1:8000;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       Connection        "";

            # Disable all buffering so SSE frames are forwarded immediately
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     86400s;   # 24 h — SSE is a persistent stream
            proxy_send_timeout     86400s;
            chunked_transfer_encoding on;
        }

        # ----- Snapshots (read-only HTML + assets served by uvicorn, v3 Part 9) -----
        location /snapshots {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ----- SPA catch-all — client-side routing -----
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Disable access log for health-check noise
        location = /api/healthz {
            proxy_pass http://127.0.0.1:8000;
            access_log off;
        }
    }
}

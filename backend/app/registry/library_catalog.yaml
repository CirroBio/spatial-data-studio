# v3 Part 4 — opt-in library functions (scanpy + spatialdata-io), added
# declaratively. squidpy is wholesale-introspected in introspect.py; this catalog
# is the "one short entry per function" import manifest for the curated libraries.
# Each entry: key = namespace.function ; path = dotted attribute within `library`.
# effect_class: compute | extract | read | plot. Entries whose import fails (e.g. a
# reader missing in the installed version) are skipped with a log line, never hardcoded.


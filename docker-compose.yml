services:
  spatial-data-studio:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: spatial-data-studio:latest

    ports:
      - "8080:80"

    # Read-only data mount (DESIGN §19.9) — test-data ships with the repo
    volumes:
      - type: bind
        source: ./test-data
        target: /data
        read_only: true
      - checkpoints:/checkpoints

    environment:
      SQV_DATA_DIR: /data
      SQV_CHECKPOINT_DIR: /checkpoints
      # Memory: container gets 12 GB; worker ceiling is 9 GB, safely below cgroup limit
      # so catchable MemoryError fires before the OOM killer (DESIGN §19.5)
      SQV_CONTAINER_MEM_MB: "12288"
      SQV_WORKER_CEILING_MB: "9216"
      SQV_MAX_SESSIONS: "4"
      SQV_ADMISSION_PCT: "0.80"
      MPLBACKEND: "Agg"
      PYTHONUNBUFFERED: "1"
      # Cirro upload. Off unless all three are set (service-account/client-credentials).
      CIRRO_BASE_URL: "${CIRRO_BASE_URL:-}"
      CIRRO_CLIENT_ID: "${CIRRO_CLIENT_ID:-}"
      CIRRO_CLIENT_SECRET: "${CIRRO_CLIENT_SECRET:-}"

    # Soft cgroup limit consistent with SQV_CONTAINER_MEM_MB
    mem_limit: 12g

    # Generous stop timeout so in-flight saves can flush (DESIGN §19.7)
    stop_grace_period: 120s

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/api/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  checkpoints:

services:
  squidpy-viewer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: squidpy-viewer:latest

    ports:
      - "8080:80"

    # Read-only data mount (DESIGN §19.9) — test-data ships with the repo
    volumes:
      - type: bind
        source: ./test-data
        target: /data
        read_only: true
      - checkpoints:/checkpoints

    environment:
      SQV_DATA_DIR: /data
      SQV_CHECKPOINT_DIR: /checkpoints
      # Memory: container gets 12 GB; worker ceiling is 9 GB, safely below cgroup limit
      # so catchable MemoryError fires before the OOM killer (DESIGN §19.5)
      SQV_CONTAINER_MEM_MB: "12288"
      SQV_WORKER_CEILING_MB: "9216"
      SQV_MAX_SESSIONS: "4"
      SQV_ADMISSION_PCT: "0.80"
      MPLBACKEND: "Agg"
      PYTHONUNBUFFERED: "1"
      # AI / Bedrock (v3 Parts 6-8). Off unless overridden; set AI_PROVIDER=mock for
      # a credential-free demo, or AI_PROVIDER=bedrock + a model id + AWS creds for real.
      AI_ENABLED: "${AI_ENABLED:-false}"
      AI_PROVIDER: "${AI_PROVIDER:-bedrock}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      BEDROCK_MODEL_ID: "${BEDROCK_MODEL_ID:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"

    # Soft cgroup limit consistent with SQV_CONTAINER_MEM_MB
    mem_limit: 12g

    # Generous stop timeout so in-flight saves can flush (DESIGN §19.7)
    stop_grace_period: 120s

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/api/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  checkpoints:
